<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>pond surface · hand-tracker</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0a0a0a; color: #eaeaea; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; }
      #stage { position: relative; width: 100vw; height: 100vh; }
      #video { display: none; }
      #ripple {
        position: absolute; inset: 0;
        width: 100vw; height: 100vh;
      }
      #legend {
        position: absolute; left: 24px; top: 56px;
        background: rgba(0, 0, 0, 0.55);
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.6;
        color: #ccc;
        max-width: 240px;
      }
      #legend[hidden] { display: none; }
      #back {
        position: absolute; right: 12px; top: 12px;
        font-size: 12px; color: #eaeaea; text-decoration: none;
        background: rgba(0, 0, 0, 0.45); padding: 8px 10px; border-radius: 6px;
      }
      #status {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        font-size: 13px; color: #888;
      }
      #status[hidden] { display: none; }
    </style>
  </head>
  <body>
    <div id="stage">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="ripple"></canvas>
      <div id="legend" hidden>pinch either hand to drop a ripple</div>
      <a id="back" href="/">← all experiments</a>
      <div id="status">starting…</div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
