<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>pdf annotator · hand-tracker</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0a0a0a; color: #eaeaea; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; }
      #stage { position: relative; width: 100vw; height: 100vh; }
      #video, #hand-overlay {
        position: absolute; inset: 0; width: 100%; height: 100%;
      }
      #video {
        object-fit: cover;
        transform: scaleX(-1);
        filter: brightness(0.25) saturate(0.4);
      }
      #hand-overlay {
        z-index: 30;
        pointer-events: none;
      }

      #pdf-scroll {
        position: absolute;
        inset: 70px 0 70px 0;
        overflow: auto;
        z-index: 2;
        text-align: center;
        padding: 20px 0;
        display: none;
      }
      #pdf-scroll.has-pdf { display: block; }
      #pdf-wrap {
        position: relative;
        display: inline-block;
        text-align: left;
      }
      #pdf-canvas, #annot-canvas {
        position: absolute; left: 0; top: 0;
        background: #fff;
      }
      #annot-canvas {
        background: transparent;
        mix-blend-mode: multiply;
      }

      #empty-state {
        position: absolute; left: 50%; top: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        padding: 32px 40px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      #empty-state[hidden] { display: none; }
      #empty-state h2 { margin: 0 0 8px; font-size: 18px; font-weight: 600; }
      #empty-state p { margin: 0 0 20px; color: #999; font-size: 13px; }
      #empty-state button {
        background: #eaeaea; color: #0a0a0a;
        border: none; padding: 10px 18px;
        border-radius: 8px; font-size: 14px; cursor: pointer;
      }

      #toolbar {
        position: absolute; left: 50%; top: 16px;
        transform: translateX(-50%);
        display: flex; gap: 6px;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        padding: 6px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        z-index: 10;
      }
      #toolbar[hidden] { display: none; }
      #toolbar button {
        background: transparent; color: #ccc;
        border: 1px solid transparent;
        padding: 8px 14px; border-radius: 6px;
        font-size: 12px; cursor: pointer;
        font-family: inherit;
      }
      #toolbar button.active {
        background: rgba(255, 230, 0, 0.18);
        border-color: rgba(255, 230, 0, 0.4);
        color: #eaeaea;
      }
      #toolbar button:hover { color: #eaeaea; }
      #toolbar .sep { width: 1px; background: rgba(255, 255, 255, 0.08); margin: 4px 2px; }

      #legend {
        position: absolute; left: 24px; top: 24px;
        background: rgba(0, 0, 0, 0.55);
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.6;
        color: #ccc;
        max-width: 240px;
        z-index: 10;
      }
      #legend[hidden] { display: none; }

      #pages {
        position: absolute; left: 50%; bottom: 24px;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.55);
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 12px;
        color: #ccc;
        display: flex; align-items: center; gap: 10px;
        z-index: 10;
      }
      #pages[hidden] { display: none; }
      #pages button {
        background: transparent; color: #ccc;
        border: 1px solid rgba(255,255,255,0.15);
        padding: 4px 10px; border-radius: 6px;
        font-size: 12px; cursor: pointer; font-family: inherit;
      }
      #pages button:hover { color: #eaeaea; }
      #pages button:disabled { opacity: 0.3; cursor: default; }

      #sig-modal {
        position: absolute; inset: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        z-index: 20;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 16px;
      }
      #sig-modal[hidden] { display: none; }
      #sig-modal h3 { margin: 0; font-size: 16px; font-weight: 600; color: #eaeaea; }
      #sig-canvas {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
      }
      #sig-actions { display: flex; gap: 10px; }
      #sig-actions button {
        background: #151515; color: #eaeaea;
        border: 1px solid #333;
        padding: 10px 18px; border-radius: 8px;
        font-size: 13px; cursor: pointer; font-family: inherit;
      }
      #sig-actions button.primary {
        background: #eaeaea; color: #0a0a0a; border-color: #eaeaea;
      }
      #sig-actions button:hover:not(.primary) { border-color: #7cf; }

      #placement-hint {
        position: absolute; left: 50%; top: 16px;
        transform: translateX(-50%);
        background: rgba(124, 204, 255, 0.18);
        border: 1px solid rgba(124, 204, 255, 0.4);
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 13px;
        color: #eaeaea;
        z-index: 11;
      }
      #placement-hint[hidden] { display: none; }

      #back {
        position: absolute; right: 12px; top: 12px;
        font-size: 12px; color: #eaeaea; text-decoration: none;
        background: rgba(0, 0, 0, 0.45); padding: 8px 10px; border-radius: 6px;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="hand-overlay"></canvas>
      <div id="pdf-scroll">
        <div id="pdf-wrap">
          <canvas id="pdf-canvas"></canvas>
          <canvas id="annot-canvas"></canvas>
        </div>
      </div>
      <div id="empty-state">
        <h2>pdf annotator</h2>
        <p>load a PDF to highlight and sign</p>
        <button id="empty-load">choose PDF</button>
      </div>
      <div id="toolbar" hidden>
        <button data-mode="highlight" class="active">highlight</button>
        <button data-mode="erase">erase</button>
        <button id="undo-btn">undo</button>
        <span class="sep"></span>
        <button id="sign-btn">sign</button>
        <button id="load-btn">load PDF</button>
      </div>
      <div id="legend" hidden>
        <div>pinch + drag to <b>highlight</b> or <b>erase</b></div>
        <div>tap <b>sign</b> to draw a signature</div>
      </div>
      <div id="pages" hidden>
        <button id="prev-page">←</button>
        <span id="page-info">1 / 1</span>
        <button id="next-page">→</button>
      </div>
      <div id="placement-hint" hidden>pinch to drop the signature here</div>
      <div id="sig-modal" hidden>
        <h3>draw your signature</h3>
        <canvas id="sig-canvas"></canvas>
        <div id="sig-actions">
          <button id="sig-clear">clear</button>
          <button id="sig-cancel">cancel</button>
          <button id="sig-save" class="primary">save</button>
        </div>
      </div>
      <input type="file" id="file-input" accept=".pdf,application/pdf" hidden>
      <a id="back" href="/">← all experiments</a>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
