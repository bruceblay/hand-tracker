<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>face fx · hand-tracker</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0a0a0a; color: #eaeaea; font-family: ui-sans-serif, system-ui, sans-serif; }
      #stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
      #video, #overlay {
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover;
      }
      #video { transform: scaleX(-1); }
      #hud {
        position: absolute; left: 12px; top: 12px;
        font-size: 12px; line-height: 1.4;
        background: rgba(0,0,0,0.45); padding: 8px 10px; border-radius: 6px;
        pointer-events: none;
      }
      #back {
        position: absolute; right: 12px; top: 12px;
        font-size: 12px; color: #eaeaea; text-decoration: none;
        background: rgba(0,0,0,0.45); padding: 8px 10px; border-radius: 6px;
      }
      #start {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        padding: 14px 22px; font-size: 16px; border-radius: 8px;
        background: #eaeaea; color: #0a0a0a; border: none; cursor: pointer;
      }
      #start[hidden] { display: none; }

      #panel {
        position: absolute;
        right: 20px; top: 50%;
        transform: translateY(-50%);
        display: flex; flex-direction: column; gap: 12px;
        pointer-events: none;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 11px;
        color: #eaeaea;
        background: rgba(0,0,0,0.45);
        padding: 14px 16px; border-radius: 8px;
      }
      #panel[hidden] { display: none; }
      .panel-row { display: flex; align-items: center; gap: 10px; }
      .panel-label { width: 80px; opacity: 0.85; }
      .panel-bar { width: 110px; height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
      .panel-fill { height: 100%; background: rgba(124, 204, 255, 0.85); width: 0%; transition: width 60ms linear; }
    </style>
  </head>
  <body>
    <div id="stage">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="panel" hidden>
        <div class="panel-row" data-id="jawOpen">
          <span class="panel-label">jaw open</span>
          <div class="panel-bar"><div class="panel-fill"></div></div>
        </div>
        <div class="panel-row" data-id="browInner">
          <span class="panel-label">brows up</span>
          <div class="panel-bar"><div class="panel-fill"></div></div>
        </div>
        <div class="panel-row" data-id="smile">
          <span class="panel-label">smile</span>
          <div class="panel-bar"><div class="panel-fill"></div></div>
        </div>
        <div class="panel-row" data-id="pucker">
          <span class="panel-label">pucker</span>
          <div class="panel-bar"><div class="panel-fill"></div></div>
        </div>
        <div class="panel-row" data-id="cheekPuff">
          <span class="panel-label">cheek puff</span>
          <div class="panel-bar"><div class="panel-fill"></div></div>
        </div>
        <div class="panel-row" data-id="pan">
          <span class="panel-label">mouth L/R</span>
          <div class="panel-bar"><div class="panel-fill"></div></div>
        </div>
      </div>
      <div id="hud" hidden></div>
      <a id="back" href="/">← all experiments</a>
      <button id="start">click to start</button>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
