<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>finger counter · hand-tracker</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0a0a0a; color: #eaeaea; font-family: ui-sans-serif, system-ui, sans-serif; }
      #stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
      #video, #overlay {
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover;
      }
      #video { transform: scaleX(-1); }

      #counter {
        position: absolute;
        left: 50%; top: 50%;
        transform: translate(-50%, -50%);
        font-size: clamp(200px, 36vw, 420px);
        font-weight: 700;
        color: rgba(255, 255, 255, 0.92);
        text-shadow: 0 6px 40px rgba(0, 0, 0, 0.55);
        pointer-events: none;
        font-variant-numeric: tabular-nums;
        line-height: 1;
        letter-spacing: -0.04em;
      }
      #counter[hidden] { display: none; }
      .pop { animation: pop 220ms cubic-bezier(0.34, 1.56, 0.64, 1); }
      @keyframes pop {
        0%   { transform: translate(-50%, -50%) scale(1.18); }
        100% { transform: translate(-50%, -50%) scale(1); }
      }

      #back {
        position: absolute; right: 12px; top: 12px;
        font-size: 12px; color: #eaeaea; text-decoration: none;
        background: rgba(0,0,0,0.45); padding: 8px 10px; border-radius: 6px;
      }
      #start {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        padding: 14px 22px; font-size: 16px; border-radius: 8px;
        background: #eaeaea; color: #0a0a0a; border: none; cursor: pointer;
      }
      #start[hidden] { display: none; }
    </style>
  </head>
  <body>
    <div id="stage">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="counter" hidden>0</div>
      <a id="back" href="/">← all experiments</a>
      <button id="start">click to start</button>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
