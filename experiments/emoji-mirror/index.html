<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>emoji mirror · hand-tracker</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0a0a0a; color: #eaeaea; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; }
      #stage { position: relative; width: 100vw; height: 100vh; }
      #video, #overlay {
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover;
      }
      #video { transform: scaleX(-1); filter: brightness(0.55); }
      #legend {
        position: absolute; left: 24px; top: 24px;
        background: rgba(0, 0, 0, 0.55);
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.6;
        color: #ccc;
        max-width: 260px;
      }
      #legend[hidden] { display: none; }
      #back {
        position: absolute; right: 12px; top: 12px;
        font-size: 12px; color: #eaeaea; text-decoration: none;
        background: rgba(0, 0, 0, 0.45); padding: 8px 10px; border-radius: 6px;
      }
      #start {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        padding: 14px 22px; font-size: 16px; border-radius: 8px;
        background: #eaeaea; color: #0a0a0a; border: none; cursor: pointer;
      }
      #start[hidden] { display: none; }
      #status {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        font-size: 14px; color: #aaa;
      }
      #status[hidden] { display: none; }
    </style>
  </head>
  <body>
    <div id="stage">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="legend" hidden>
        <div>your face → matching emoji</div>
        <div>your hand → matching emoji (fist, peace, thumbs up, etc.)</div>
      </div>
      <a id="back" href="/">← all experiments</a>
      <button id="start">click to start</button>
      <div id="status" hidden>loading…</div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
