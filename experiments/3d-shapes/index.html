<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>3d shapes · hand-tracker</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0a0a0a; color: #eaeaea; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; }
      #stage { position: relative; width: 100vw; height: 100vh; }
      #video, #scene, #overlay {
        position: absolute; inset: 0; width: 100%; height: 100%;
      }
      #video {
        object-fit: cover;
        transform: scaleX(-1);
        filter: brightness(0.25) saturate(0.4);
      }

      #controls {
        position: absolute; right: 24px; top: 56px;
        background: rgba(0, 0, 0, 0.55);
        padding: 12px 14px;
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.6;
        color: #ccc;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #controls[hidden] { display: none; }
      #controls label { font-size: 11px; color: #888; letter-spacing: 0.04em; text-transform: uppercase; }
      #shape-select {
        background: #151515;
        color: #eaeaea;
        border: 1px solid #333;
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 13px;
        font-family: inherit;
        cursor: pointer;
      }
      #shape-select:focus { outline: none; border-color: #7cf; }

      #legend {
        position: absolute; left: 24px; top: 24px;
        background: rgba(0, 0, 0, 0.55);
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.6;
        color: #ccc;
        max-width: 220px;
      }
      #legend[hidden] { display: none; }

      #back {
        position: absolute; right: 12px; top: 12px;
        font-size: 12px; color: #eaeaea; text-decoration: none;
        background: rgba(0, 0, 0, 0.45); padding: 8px 10px; border-radius: 6px;
      }
      #status {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        font-size: 13px; color: #888;
      }
      #status[hidden] { display: none; }
    </style>
  </head>
  <body>
    <div id="stage">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="scene"></canvas>
      <canvas id="overlay"></canvas>
      <div id="controls" hidden>
        <label>shape</label>
        <select id="shape-select">
          <option value="torus">torus</option>
          <option value="torusKnot">torus knot</option>
          <option value="heart">heart</option>
          <option value="star">star</option>
          <option value="icosahedron">icosahedron</option>
          <option value="dodecahedron">dodecahedron</option>
          <option value="octahedron">octahedron</option>
          <option value="tetrahedron">tetrahedron</option>
          <option value="capsule">capsule</option>
          <option value="cone">cone</option>
          <option value="cylinder">cylinder</option>
          <option value="cube">cube</option>
        </select>
      </div>
      <div id="legend" hidden>
        <div>one hand: move to rotate</div>
        <div>two hands: spread to zoom in, bring together to zoom out</div>
      </div>
      <a id="back" href="/">← all experiments</a>
      <div id="status">starting…</div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
