<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>theremin · hand-tracker</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0a0a0a; color: #eaeaea; font-family: ui-sans-serif, system-ui, sans-serif; }
      #stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
      #video, #overlay {
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover;
      }
      #video { transform: scaleX(-1); transition: filter 0.4s ease; }
      #stage.rave #video { filter: brightness(0.6) contrast(1.2) saturate(1.4) hue-rotate(-10deg); }
      #hud {
        position: absolute; left: 12px; top: 12px;
        font-size: 12px; line-height: 1.4;
        background: rgba(0,0,0,0.45); padding: 8px 10px; border-radius: 6px;
        pointer-events: none;
      }
      #controls {
        position: absolute; right: 12px; top: 50px;
        background: rgba(0,0,0,0.55);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        padding: 10px 12px; border-radius: 8px;
        font-size: 12px; color: #ccc;
        display: flex; flex-direction: column; align-items: stretch; gap: 8px;
        min-width: 160px;
      }
      #controls[hidden] { display: none; }
      #controls .row { display: flex; flex-direction: column; gap: 4px; }
      #controls .label { color: #888; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
      #controls select {
        background: #151515; color: #eaeaea;
        border: 1px solid #333;
        padding: 4px 8px; border-radius: 4px;
        font-family: inherit; font-size: 12px;
        cursor: pointer;
      }
      #controls select:focus { outline: none; border-color: #7cf; }
      #controls .mode { display: flex; align-items: center; gap: 10px; }
      #controls .mode label { display: inline-flex; align-items: center; gap: 4px; cursor: pointer; color: #ccc; }
      #controls .mode input[type="radio"] { accent-color: #7cf; cursor: pointer; }
      #controls .slider { display: flex; align-items: center; gap: 6px; }
      #controls .slider input[type="range"] {
        flex: 1; accent-color: #7cf; cursor: pointer;
        height: 14px;
      }
      #controls .slider .name { color: #aaa; font-size: 11px; min-width: 56px; }
      #controls .slider .val { color: #888; font-size: 10px; min-width: 28px; text-align: right; font-variant-numeric: tabular-nums; }
      #controls .group {
        border-top: 1px solid #2a2a2a;
        padding-top: 8px;
        display: flex; flex-direction: column; gap: 4px;
      }
      #back {
        position: absolute; right: 12px; top: 12px;
        font-size: 12px; color: #eaeaea; text-decoration: none;
        background: rgba(0,0,0,0.45); padding: 8px 10px; border-radius: 6px;
      }
      #start {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        padding: 14px 22px; font-size: 16px; border-radius: 8px;
        background: #eaeaea; color: #0a0a0a; border: none; cursor: pointer;
      }
      #start[hidden] { display: none; }
    </style>
  </head>
  <body>
    <div id="stage">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="hud" hidden></div>
      <div id="controls" hidden>
        <div class="row">
          <span class="label">preset</span>
          <select id="preset-select">
            <option value="classic">classic theremin</option>
            <option value="smooth">smooth pad</option>
            <option value="lead">saw lead</option>
            <option value="fatSaw">fat saw</option>
            <option value="buzz">square buzz</option>
            <option value="pulse">narrow pulse</option>
            <option value="wobble">wobble</option>
            <option value="amRing">am ring</option>
            <option value="glass">glass</option>
            <option value="fm">fm bell</option>
          </select>
        </div>
        <div class="row">
          <span class="label">pitch</span>
          <div class="mode">
            <label><input type="radio" name="pitch-mode" value="stepped" checked /> stepped</label>
            <label><input type="radio" name="pitch-mode" value="continuous" /> continuous</label>
          </div>
        </div>
        <div class="group">
          <span class="label">reverb</span>
          <div class="slider">
            <span class="name">mix</span>
            <input id="reverb-wet" type="range" min="0" max="1" step="0.01" value="0" />
            <span class="val" id="reverb-wet-val">0</span>
          </div>
          <div class="slider">
            <span class="name">decay</span>
            <input id="reverb-decay" type="range" min="0.5" max="10" step="0.1" value="3" />
            <span class="val" id="reverb-decay-val">3.0s</span>
          </div>
        </div>
        <div class="group">
          <span class="label">delay</span>
          <div class="slider">
            <span class="name">mix</span>
            <input id="delay-wet" type="range" min="0" max="1" step="0.01" value="0" />
            <span class="val" id="delay-wet-val">0</span>
          </div>
          <div class="slider">
            <span class="name">time</span>
            <input id="delay-time" type="range" min="0.02" max="1" step="0.01" value="0.25" />
            <span class="val" id="delay-time-val">250ms</span>
          </div>
          <div class="slider">
            <span class="name">feedback</span>
            <input id="delay-feedback" type="range" min="0" max="0.9" step="0.01" value="0.35" />
            <span class="val" id="delay-feedback-val">0.35</span>
          </div>
        </div>
        <div class="group">
          <span class="label">mode</span>
          <div class="mode">
            <label><input type="radio" name="display-mode" value="normal" checked /> normal</label>
            <label><input type="radio" name="display-mode" value="rave" /> rave</label>
          </div>
        </div>
      </div>
      <a id="back" href="/">← all experiments</a>
      <button id="start">click to start</button>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
